<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <script
      src="https://kit.fontawesome.com/0ef76c0181.js"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="page1.css" />
    <title>Document</title>
  </head>

  <body>
    <div class="navbar">
      <nav class="navbar">
        <div class="col-3 px-4 d-flex justify-content-start align-items-center">
          <img src="./images/logo.png" alt="" srcset="" height="50" />
        </div>
        <div class="col-6 bullets d-flex">
          <span class="bullet active"
            ><a href="./page1.html"
              ><i class="fa fa-ticket" style="font-size: 24px"></i></a
          ></span>
          <span class="bullet active"
            ><a href="./page2.html"
              ><i class="fa fa-map-o" style="font-size: 24px"></i></a
          ></span>
          <span class="bullet active"
            ><a href="#"
              ><i class="fa fa-cc-visa" style="font-size: 24px"></i></a
          ></span>
          <span class="bullet active"
            ><a href="./page4.html"
              ><i class="fa fa-check" style="font-size: 24px"></i></a
          ></span>
        </div>
        <div class="col-3 px-2 d-flex justify-content-end">
          <button class="white_btn" onClick="exit();">Logout</button>
        </div>
      </nav>

      <div class="container my-5 p-2" style="background-color: antiquewhite">
        <div class="col p-2">
          <div
            class="row mx-auto p-2"
            style="background-color: rgb(197, 124, 28)"
          >
            <h2 style="text-align: center">Payment Gateway</h2>
          </div>
          <div class="row m-5 p-3 d-flex justify-content-center" style="background-color: rgb(9, 67, 95)">
            <h3 style="text-align: center; color: antiquewhite">
              Grand Total : 3000 INR
            </h3>
            <hr />
            <h4 style="text-align: center; color: antiquewhite">
              Thank you for choosing our services!
            </h4>
            <hr />
            <h4 style="text-align: center; color: antiquewhite">
              How would you like to pay the bill?
            </h4>
            <hr />

            <div class="row p-3">
              <div
                class="col d-flex align-items-center justify-content-end px-5"
              >
                <i
                  class="fa-solid fa-qrcode fa-3x"
                  style="margin-right: 0.6em"
                ></i>
                <button type="button" class="btn btn-warning">
                  Google Pay / UPI
                </button>
              </div>
              <div
                class="col d-flex align-items-center justify-content-start px-5"
              >
                <i
                  class="fa-regular fa-credit-card fa-3x"
                  style="margin-right: 0.6em"
                ></i>
                <button type="button" class="btn btn-warning">
                  Credit / Debit Card
                </button>
              </div>
            </div>
            <hr />
            <div class="row p-2 d-flex justify-content-center">
              <a
                href="./page4.html"
                class="btn btn-success btn-lg"
                role="button"
                style="width: max-content"
                >Proceed
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Separate Popper and Bootstrap JS -->

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
      integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
      integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
